apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-demo
  template:
    metadata:
      labels:
        app: java-demo
    spec:
      containers:
      - name: java-demo
        image: 131127508996.dkr.ecr.ap-south-1.amazonaws.com/java-app-demo-eks:latest
        ports:
        - containerPort: 8080
